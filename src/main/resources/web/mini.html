<!DOCTYPE html>
<html>
<body>

<div style="position:relative; width:800px; height:600px; background: #000;">
    <canvas id="screen" width="800" height="600" style="position:absolute; top:0; left:0; -webkit-user-drag: none; user-select: none; touch-action: none;"></canvas>
</div>

<script>

let canvas = document.getElementById("screen")
let context = canvas.getContext("2d")
let eventWs = null
let streamSource = null
let patchQueue = []
let isApplyingPatch = false

connectEvents()
connectStream()

function connectEvents() {
    eventWs = new WebSocket("ws://" + window.location.host + "/events")

    eventWs.onopen = () => {
        sendReady()
    }

    eventWs.onclose = () => {
        setTimeout(connectEvents, 1000)
    }
}

function connectStream() {
    streamSource = new EventSource("/stream")

    streamSource.onmessage = e => {
        let message = null
        try {
            message = JSON.parse(e.data)
        } catch (_) {
            return
        }

        if (message.type === "FRAME_PATCH") {
            patchQueue.push(message)
            applyPatchQueue()
        }
    }

    streamSource.onerror = () => {
        if (streamSource) {
            streamSource.close()
        }
        setTimeout(connectStream, 1000)
    }
}

function sendReady() {
    if (eventWs.readyState === WebSocket.OPEN) {
        eventWs.send(JSON.stringify({type: "READY"}));
    }
}

async function applyPatchQueue() {
    if (isApplyingPatch) {
        return
    }

    isApplyingPatch = true
    while (patchQueue.length > 0) {
        let patch = patchQueue.shift()
        await drawPatch(patch)
    }
    isApplyingPatch = false
}

function drawPatch(patch) {
    return new Promise(async resolve => {
        try {
            let bytes = base64ToBytes(patch.image)
            let blob = new Blob([bytes], { type: "image/png" })
            let bitmap = await createImageBitmap(blob)
            context.drawImage(bitmap, patch.x, patch.y, patch.width, patch.height)
            bitmap.close()
        } catch (_) {
            // Ignore malformed patches and continue streaming.
        }
        resolve()
    })
}

function base64ToBytes(base64) {
    let binary = atob(base64)
    let bytes = new Uint8Array(binary.length)
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i)
    }
    return bytes
}

let isDragging = false;
let activePointerId = null;

canvas.addEventListener("pointerdown", e => {
    if (e.button !== 0) {
        return;
    }
    isDragging = true;
    activePointerId = e.pointerId;
    canvas.setPointerCapture(e.pointerId);
    sendEvent("MOUSE_PRESSED", e);
});

canvas.addEventListener("pointermove", e => {
    if (!isDragging) {
        return;
    }
    if (activePointerId !== null && e.pointerId !== activePointerId) {
        return;
    }
    sendCoalescedDragEvents(e);
});

canvas.addEventListener("pointerup", e => {
    endDrag(e);
});

canvas.addEventListener("pointercancel", e => {
    endDrag(e);
});

canvas.addEventListener("lostpointercapture", e => {
    endDrag(e);
});

window.addEventListener("blur", () => {
    if (isDragging) {
        endDrag(lastKnownPointerEvent());
    }
});

document.addEventListener("visibilitychange", () => {
    if (document.hidden && isDragging) {
        endDrag(lastKnownPointerEvent());
    }
});

function endDrag(e) {
    if (!isDragging) {
        return;
    }
    if (e && activePointerId !== null && e.pointerId !== undefined && e.pointerId !== activePointerId) {
        return;
    }

    isDragging = false;
    if (e) {
        sendEvent("MOUSE_RELEASED", e);
    }

    if (activePointerId !== null && canvas.hasPointerCapture(activePointerId)) {
        canvas.releasePointerCapture(activePointerId);
    }
    activePointerId = null;
}

function lastKnownPointerEvent() {
    return {
        clientX: canvas.getBoundingClientRect().left,
        clientY: canvas.getBoundingClientRect().top
    };
}

function sendCoalescedDragEvents(e) {
    if (typeof e.getCoalescedEvents !== "function") {
        sendEvent("MOUSE_DRAGGED", e);
        return;
    }

    let samples = e.getCoalescedEvents();
    if (!samples || samples.length === 0) {
        sendEvent("MOUSE_DRAGGED", e);
        return;
    }

    for (let i = 0; i < samples.length; i++) {
        sendEvent("MOUSE_DRAGGED", samples[i]);
    }
}

function sendEvent(type, e) {
    if (eventWs.readyState === WebSocket.OPEN) {
        let rect = canvas.getBoundingClientRect()
        let x = e.clientX - rect.left
        let y = e.clientY - rect.top
        eventWs.send(JSON.stringify({type: type, x: x, y: y}))
    }
}
</script>

</body>
</html>
